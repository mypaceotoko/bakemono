<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>化物語 - ランダムキャラクター</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --card-bg: #12121a;
      --accent: #c8a0f0;
      --accent2: #f08080;
      --text: #e8e0f0;
      --muted: #807090;
      --border: #2a1a3a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 2.4rem;
      letter-spacing: 0.3em;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(200, 160, 240, 0.4);
    }

    header p {
      margin-top: 0.5rem;
      color: var(--muted);
      font-size: 0.9rem;
      letter-spacing: 0.1em;
    }

    #card-container {
      width: 100%;
      max-width: 420px;
      min-height: 540px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(200,160,240,0.05);
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-image-wrap {
      position: relative;
      width: 100%;
      height: 360px;
      background: #0d0d16;
      overflow: hidden;
    }

    .card-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }

    .card-image-wrap .role-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(10, 10, 15, 0.75);
      border: 1px solid var(--border);
      color: var(--accent);
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      padding: 4px 10px;
      border-radius: 20px;
      backdrop-filter: blur(6px);
    }

    .card-body {
      padding: 1.4rem 1.6rem 1.6rem;
    }

    .card-body h2 {
      font-size: 1.5rem;
      color: var(--text);
      letter-spacing: 0.05em;
      line-height: 1.3;
    }

    .card-body .name-jp {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 4px;
      letter-spacing: 0.08em;
    }

    .card-body .va-section {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .card-body .va-label {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .card-body .va-name {
      font-size: 0.95rem;
      color: var(--accent2);
    }

    .skeleton {
      background: linear-gradient(90deg, #1a1a2a 25%, #221a32 50%, #1a1a2a 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-card {
      width: 100%;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .skeleton-img {
      height: 360px;
    }

    .skeleton-body {
      padding: 1.4rem 1.6rem 1.6rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .skeleton-line {
      height: 1em;
    }

    .skeleton-line.short { width: 55%; }
    .skeleton-line.long  { width: 80%; }

    #btn-next {
      margin-top: 2rem;
      padding: 0.85rem 2.4rem;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-size: 1rem;
      letter-spacing: 0.2em;
      border-radius: 40px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }

    #btn-next:hover:not(:disabled) {
      background: var(--accent);
      color: var(--bg);
      box-shadow: 0 0 20px rgba(200, 160, 240, 0.35);
    }

    #btn-next:disabled {
      opacity: 0.4;
      cursor: default;
    }

    #counter {
      margin-top: 1rem;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    #error-msg {
      color: var(--accent2);
      text-align: center;
      padding: 2rem;
      font-size: 0.9rem;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <header>
    <h1>化物語</h1>
    <p>ランダムキャラクター</p>
  </header>

  <div id="card-container">
    <div class="skeleton-card">
      <div class="skeleton skeleton-img"></div>
      <div class="skeleton-body">
        <div class="skeleton skeleton-line long"></div>
        <div class="skeleton skeleton-line short"></div>
      </div>
    </div>
  </div>

  <button id="btn-next" disabled>次のキャラクター</button>
  <div id="counter"></div>

  <script>
    const ANIME_ID = 5081; // Bakemonogatari MAL ID
    const API_URL = `https://api.jikan.moe/v4/anime/${ANIME_ID}/characters`;

    let characters = [];
    let lastIndex = -1;

    const container = document.getElementById('card-container');
    const btnNext   = document.getElementById('btn-next');
    const counter   = document.getElementById('counter');

    function pickRandom() {
      if (characters.length === 0) return null;
      if (characters.length === 1) return 0;
      let idx;
      do { idx = Math.floor(Math.random() * characters.length); }
      while (idx === lastIndex);
      lastIndex = idx;
      return idx;
    }

    function renderCard(entry) {
      const char   = entry.character;
      const jaVA   = entry.voice_actors?.find(v => v.language === 'Japanese');
      const imgUrl = char.images?.jpg?.image_url || char.images?.webp?.image_url || '';
      const role   = entry.role === 'Main' ? 'メイン' : 'サブ';

      container.innerHTML = `
        <div class="card">
          <div class="card-image-wrap">
            ${imgUrl
              ? `<img src="${imgUrl}" alt="${char.name}" loading="lazy" />`
              : `<div style="height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:3rem;">？</div>`
            }
            <span class="role-badge">${role}</span>
          </div>
          <div class="card-body">
            <h2>${char.name}</h2>
            ${jaVA ? `
              <div class="va-section">
                <div class="va-label">声優</div>
                <div class="va-name">${jaVA.person.name}</div>
              </div>
            ` : ''}
          </div>
        </div>
      `;
      counter.textContent = `${characters.indexOf(entry) + 1} / ${characters.length} キャラクター`;
    }

    function showNext() {
      const idx = pickRandom();
      if (idx === null) return;
      renderCard(characters[idx]);
    }

    async function init() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        characters = data.data || [];

        if (characters.length === 0) {
          container.innerHTML = `<div id="error-msg">キャラクターが見つかりませんでした。</div>`;
          return;
        }

        showNext();
        btnNext.disabled = false;
      } catch (e) {
        container.innerHTML = `<div id="error-msg">データの取得に失敗しました。<br>しばらくしてからリロードしてください。<br><small style="color:var(--muted)">${e.message}</small></div>`;
      }
    }

    btnNext.addEventListener('click', showNext);
    init();
  </script>
</body>
</html>
