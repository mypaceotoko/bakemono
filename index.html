<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>物語シリーズ — キャラクター</title>
  <style>
    :root {
      --bg: #07070f;
      --surface: #0f0f1a;
      --card: #13131f;
      --border: #ffffff0f;
      --accent: #b389f5;
      --accent2: #f07878;
      --accent3: #78b4f0;
      --text: #ede8f8;
      --muted: #7a6e90;
      --dim: #3a3050;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Meiryo', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      padding: 2.5rem 1rem 1.5rem;
      text-align: center;
    }

    header::after {
      content: '';
      display: block;
      width: 120px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 1.2rem auto 0;
    }

    header h1 {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      letter-spacing: 0.35em;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      margin-top: 0.4rem;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.2em;
    }

    main {
      width: 100%;
      max-width: 900px;
      padding: 1.5rem 1rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.4rem;
    }

    /* ── Filter bars ── */
    .filter-section {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .filter-label {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding-left: 2px;
    }

    .filter-row {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.18s;
      background: transparent;
      border: 1px solid var(--dim);
      color: var(--muted);
      white-space: nowrap;
    }

    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(179, 137, 245, 0.1);
    }

    .filter-btn:hover:not(.active) {
      border-color: var(--muted);
      color: var(--text);
    }

    /* ── Card ── */
    #card-wrap {
      width: 100%;
      min-height: 460px;
      display: flex;
      align-items: stretch;
    }

    .card {
      width: 100%;
      display: grid;
      grid-template-columns: 230px 1fr;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 580px) {
      .card { grid-template-columns: 1fr; }
      .card-image { height: 300px; }
    }

    .card-image {
      position: relative;
      overflow: hidden;
      background: #0a0a14;
    }

    .card-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
      transition: transform 0.6s ease;
    }

    .card:hover .card-image img { transform: scale(1.04); }

    .card-image .role-tag {
      position: absolute;
      bottom: 12px;
      left: 12px;
      padding: 4px 11px;
      border-radius: 20px;
      font-size: 0.67rem;
      letter-spacing: 0.15em;
      font-weight: 600;
    }

    .role-tag.main {
      background: rgba(179, 137, 245, 0.2);
      border: 1px solid rgba(179, 137, 245, 0.4);
      color: var(--accent);
    }

    .role-tag.supporting {
      background: rgba(120, 180, 240, 0.15);
      border: 1px solid rgba(120, 180, 240, 0.3);
      color: var(--accent3);
    }

    .series-tags {
      position: absolute;
      top: 10px;
      left: 10px;
      right: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .series-tag {
      padding: 3px 8px;
      border-radius: 6px;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      background: rgba(7,7,15,0.75);
      border: 1px solid rgba(255,255,255,0.08);
      color: #c8b8e8;
      backdrop-filter: blur(4px);
      line-height: 1.4;
    }

    .card-body {
      padding: 1.8rem 1.6rem;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .char-name-en {
      font-size: 1.45rem;
      font-weight: 700;
      line-height: 1.2;
      color: var(--text);
    }

    .char-name-jp {
      margin-top: 4px;
      font-size: 1rem;
      color: var(--accent);
      letter-spacing: 0.1em;
    }

    .meta-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 1.1rem;
    }

    .meta-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 11px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.73rem;
    }

    .meta-chip .label { color: var(--muted); }
    .meta-chip .value { color: var(--text); font-weight: 500; }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 1.1rem 0;
    }

    .desc-label {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .desc-text {
      font-size: 0.86rem;
      line-height: 1.8;
      color: #b8a8d0;
      display: -webkit-box;
      -webkit-line-clamp: 6;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .desc-text b, .desc-text strong { color: var(--text); }

    .no-desc { font-size: 0.83rem; color: var(--muted); font-style: italic; }

    /* ── Controls ── */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.8rem;
    }

    .btn-row { display: flex; gap: 10px; }

    .btn {
      padding: 0.75rem 1.8rem;
      border-radius: 40px;
      font-size: 0.92rem;
      letter-spacing: 0.14em;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-primary {
      background: var(--accent);
      color: #070410;
      font-weight: 700;
    }

    .btn-primary:hover:not(:disabled) {
      background: #c9adff;
      box-shadow: 0 0 28px rgba(179,137,245,0.4);
      transform: translateY(-2px);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--dim);
      color: var(--muted);
    }

    .btn-outline:hover:not(:disabled) {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn:disabled { opacity: 0.3; cursor: default; }

    .counter {
      font-size: 0.73rem;
      color: var(--muted);
      letter-spacing: 0.12em;
    }

    /* ── Loading progress ── */
    .loading-card {
      width: 100%;
      display: grid;
      grid-template-columns: 230px 1fr;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    @media (max-width: 580px) {
      .loading-card { grid-template-columns: 1fr; }
      .loading-img  { height: 300px; }
    }

    .loading-img  { min-height: 460px; }
    .loading-body { padding: 1.8rem 1.6rem; display: flex; flex-direction: column; gap: 12px; justify-content: center; }
    .sk { border-radius: 6px; background: linear-gradient(90deg, #161624 25%, #1e1a30 50%, #161624 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .loading-status {
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .progress-bar-wrap {
      width: 100%;
      height: 3px;
      background: var(--dim);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .error-box {
      text-align: center;
      padding: 3rem 2rem;
      color: var(--accent2);
      line-height: 1.9;
    }

    .error-box small { color: var(--muted); font-size: 0.78rem; }

    /* ── Description + translate ── */
    .desc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .btn-translate {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      border: 1px solid var(--dim);
      background: transparent;
      color: var(--muted);
      transition: all 0.18s;
    }

    .btn-translate:hover { border-color: var(--accent3); color: var(--accent3); }
    .btn-translate:disabled { opacity: 0.4; cursor: default; }
    .btn-translate.translated { border-color: var(--accent3); color: var(--accent3); background: rgba(120,180,240,0.08); }

    /* ── Quote ── */
    .quote-box {
      margin-top: 1rem;
      padding: 0.9rem 1.1rem;
      border-left: 2px solid var(--accent);
      background: rgba(179, 137, 245, 0.05);
      border-radius: 0 10px 10px 0;
      position: relative;
    }

    .quote-label {
      font-size: 0.63rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.45rem;
    }

    .quote-text {
      font-size: 0.9rem;
      line-height: 1.85;
      color: var(--text);
      font-style: italic;
    }

    .quote-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      margin-top: 0.6rem;
      gap: 8px;
    }

    .btn-voice {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      border: 1px solid rgba(179, 137, 245, 0.35);
      background: rgba(179, 137, 245, 0.08);
      color: var(--accent);
      transition: all 0.18s;
    }

    .btn-voice:hover { background: rgba(179, 137, 245, 0.18); box-shadow: 0 0 14px rgba(179,137,245,0.2); }
    .btn-voice.playing { border-color: var(--accent2); color: var(--accent2); background: rgba(240,120,120,0.08); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    .btn-voice.playing { animation: pulse 1s infinite; }
  </style>
</head>
<body>

<header>
  <h1>物語シリーズ</h1>
  <p>MONOGATARI SERIES — CHARACTER</p>
</header>

<main>
  <div class="filter-section" id="filter-section" style="visibility:hidden">
    <div>
      <div class="filter-label">シリーズ</div>
      <div class="filter-row" id="series-filter">
        <button class="filter-btn active" data-series="all">すべて</button>
      </div>
    </div>
    <div>
      <div class="filter-label">役割</div>
      <div class="filter-row" id="role-filter">
        <button class="filter-btn active" data-role="all">すべて</button>
        <button class="filter-btn" data-role="MAIN">メイン</button>
        <button class="filter-btn" data-role="SUPPORTING">サブ</button>
      </div>
    </div>
  </div>

  <div id="card-wrap">
    <div class="loading-card">
      <div class="sk loading-img"></div>
      <div class="loading-body">
        <div class="loading-status" id="loading-status">データ取得中…</div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="progress-bar" style="width:0%"></div>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="btn-row">
      <button class="btn btn-outline" id="btn-prev" disabled>← 戻る</button>
      <button class="btn btn-primary" id="btn-next" disabled>ランダム表示</button>
    </div>
    <div class="counter" id="counter"></div>
  </div>
</main>

<script>
const ANILIST = 'https://graphql.anilist.co';

// 物語シリーズ全作品
const SERIES_LIST = [
  { search: 'Bakemonogatari',                       label: '化物語' },
  { search: 'Nisemonogatari',                       label: '偽物語' },
  { search: 'Nekomonogatari Kuro',                  label: 'ネコ物語（黒）' },
  { search: 'Monogatari Series Second Season',      label: '物語シリーズ セカンドシーズン' },
  { search: 'Hanamonogatari',                       label: '花物語' },
  { search: 'Tsukimonogatari',                      label: '憑物語' },
  { search: 'Owarimonogatari',                      label: '終物語' },
  { search: 'Koyomimonogatari',                     label: '暦物語' },
  { search: 'Owarimonogatari 2nd Season',           label: '終物語（下）' },
  { search: 'Zoku Owarimonogatari',                 label: '続・終物語' },
  { search: 'Musubi no Ichihi',                     label: '結び の 一 日' },
];

const QUERY = `
query ($search: String, $page: Int) {
  Media(search: $search, type: ANIME) {
    id
    title { romaji native }
    characters(sort: ROLE, page: $page, perPage: 25) {
      pageInfo { hasNextPage }
      edges {
        role
        voiceActors(language: JAPANESE) {
          id
          name { full native }
          image { large }
        }
        node {
          id
          name { full native }
          image { large }
          description(asHtml: false)
          gender
          age
          dateOfBirth { month day }
        }
      }
    }
  }
}`;

// Map: seriesLabel → edges[]
const seriesMap = new Map();
// Map: charId → { edge, seriesLabels[] }
const charMap   = new Map();

let filtered   = [];
let history    = [];
let historyIdx = -1;
let seriesFilter = 'all';
let roleFilter   = 'all';

const wrap       = document.getElementById('card-wrap');
const btnNext    = document.getElementById('btn-next');
const btnPrev    = document.getElementById('btn-prev');
const counter    = document.getElementById('counter');
const filterSec  = document.getElementById('filter-section');
const seriesFilterRow = document.getElementById('series-filter');
const roleFilterRow   = document.getElementById('role-filter');
const loadingStatus   = document.getElementById('loading-status');
const progressBar     = document.getElementById('progress-bar');

// ── Fetch one series (all pages) ──────────────────────────
async function fetchSeries(search, label) {
  let page = 1, hasNext = true;
  const edges = [];

  while (hasNext) {
    const res = await fetch(ANILIST, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: QUERY, variables: { search, page } })
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (json.errors || !json.data.Media) break;

    const chars = json.data.Media.characters;
    edges.push(...chars.edges);
    hasNext = chars.pageInfo.hasNextPage;
    page++;
  }

  seriesMap.set(label, edges);

  // Merge into charMap (deduplicate by character id)
  for (const edge of edges) {
    const id = edge.node.id;
    if (charMap.has(id)) {
      charMap.get(id).seriesLabels.push(label);
      // keep highest role (MAIN > SUPPORTING)
      if (edge.role === 'MAIN') charMap.get(id).edge.role = 'MAIN';
    } else {
      charMap.set(id, { edge, seriesLabels: [label] });
    }
  }
}

// ── Fetch all series sequentially ────────────────────────
async function fetchAll() {
  for (let i = 0; i < SERIES_LIST.length; i++) {
    const { search, label } = SERIES_LIST[i];
    loadingStatus.textContent = `「${label}」を取得中… (${i + 1}/${SERIES_LIST.length})`;
    progressBar.style.width = `${((i + 1) / SERIES_LIST.length) * 100}%`;
    try { await fetchSeries(search, label); } catch(e) { /* skip failed */ }
    // Small delay to respect rate limit
    if (i < SERIES_LIST.length - 1) await new Promise(r => setTimeout(r, 350));
  }
}

// ── Character quotes (Japanese) ───────────────────────────
const CHAR_QUOTES = {

  ],

  ],
  'Tsubasa Hanekawa': [
    '知らないことは知らないよ。私が知っているのは、私が知っていることだけ。',

    '羨ましいと思う気持ちさえ、ずっと抑えてきたんだよ。',
  ],
  'Shinobu Oshino': [
    '余は怒っておらぬ。ただ、少々不機嫌なだけじゃ。',

  ],

  ],

  ],

  ],

  ],

  ],

// ── Translation (Google unofficial, cached) ───────────────
const TRANS_CACHE_KEY = 'monogatari_trans_v1';
let transCache = {};
try { transCache = JSON.parse(localStorage.getItem(TRANS_CACHE_KEY) || '{}'); } catch {}

async function translateText(text, charId) {
  const cacheId = `c${charId}`;
  if (transCache[cacheId]) return transCache[cacheId];

  const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl=ja&dt=t&q=${encodeURIComponent(text)}`;
  const res  = await fetch(url);
  if (!res.ok) throw new Error(`translate HTTP ${res.status}`);
  const data = await res.json();
  const translated = data[0].map(seg => seg[0]).join('');

  transCache[cacheId] = translated;
  try { localStorage.setItem(TRANS_CACHE_KEY, JSON.stringify(transCache)); } catch {}
  return translated;
}

// ── Voice (Web Speech API) ────────────────────────────────
let currentUtterance = null;
let voicesReady = false;

function getJaVoice() {
  return window.speechSynthesis?.getVoices().find(v => v.lang.startsWith('ja')) || null;
}

function speakText(text, btnEl) {
  if (!window.speechSynthesis) return;

  // Stop if already playing
  if (currentUtterance) {
    window.speechSynthesis.cancel();
    currentUtterance = null;
    if (btnEl) { btnEl.classList.remove('playing'); btnEl.textContent = '▶ 音声を聞く'; }
    return;
  }

  const utter = new SpeechSynthesisUtterance(text);
  utter.lang  = 'ja-JP';
  utter.rate  = 0.88;
  utter.pitch = 1.05;
  const v = getJaVoice();
  if (v) utter.voice = v;

  utter.onstart = () => {
    currentUtterance = utter;
    if (btnEl) { btnEl.classList.add('playing'); btnEl.textContent = '■ 停止'; }
  };
  utter.onend = utter.onerror = () => {
    currentUtterance = null;
    if (btnEl) { btnEl.classList.remove('playing'); btnEl.textContent = '▶ 音声を聞く'; }
  };

  window.speechSynthesis.speak(utter);
}

// preload voices
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.addEventListener('voiceschanged', () => { voicesReady = true; });
}

// ── Sanitize description ───────────────────────────────────
function sanitizeDesc(raw) {
  if (!raw) return '';
  return raw
    .replace(/~![\s\S]*?!~/g, '<span style="background:var(--dim);color:var(--dim);border-radius:3px;padding:0 3px;cursor:pointer" onclick="this.style.color=\'var(--text)\'">ネタバレ</span>')
    .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
    .replace(/__(.+?)__/g, '<b>$1</b>')
    .replace(/\*(.+?)\*/g, '<i>$1</i>')
    .replace(/_(.+?)_/g, '<i>$1</i>')
    .replace(/\n/g, '<br>');
}

// ── Render ────────────────────────────────────────────────
function renderCard({ edge, seriesLabels }) {
  window.speechSynthesis?.cancel();
  currentUtterance = null;

  const ch   = edge.node;
  const role = edge.role;
  const va   = edge.voiceActors?.[0];
  const img  = ch.image?.large || '';
  const nameEn = ch.name?.full   || '―';
  const nameJp = ch.name?.native || '';
  const desc   = sanitizeDesc(ch.description);

  const chips = [];
  if (ch.gender) chips.push(`<div class="meta-chip"><span class="label">性別</span><span class="value">${ch.gender === 'Female' ? '女性' : ch.gender === 'Male' ? '男性' : ch.gender}</span></div>`);
  if (ch.age)    chips.push(`<div class="meta-chip"><span class="label">年齢</span><span class="value">${ch.age}</span></div>`);
  if (ch.dateOfBirth?.month && ch.dateOfBirth?.day)
    chips.push(`<div class="meta-chip"><span class="label">誕生日</span><span class="value">${ch.dateOfBirth.month}/${ch.dateOfBirth.day}</span></div>`);
  if (va)
    chips.push(`<div class="meta-chip"><span class="label">声優</span><span class="value" style="color:var(--accent2)">${va.name?.native || va.name?.full || ''}</span></div>`);

  const roleLabel = role === 'MAIN' ? 'メイン' : 'サブ';
  const roleClass = role === 'MAIN' ? 'main' : 'supporting';

  const seriesTagsHtml = seriesLabels.map(l => `<span class="series-tag">${l}</span>`).join('');

  // Quote
  const quotes = CHAR_QUOTES[nameEn] || [];
  const quote  = quotes.length ? quotes[Math.floor(Math.random() * quotes.length)] : null;
  const hasTTS = !!window.speechSynthesis;

  // Cached translation?
  const cacheId = `c${ch.id}`;
  const cachedJa = transCache[cacheId];

  wrap.innerHTML = `
    <div class="card">
      <div class="card-image">
        ${img
          ? `<img src="${img}" alt="${nameEn}" loading="eager" />`
          : `<div style="height:100%;min-height:460px;display:flex;align-items:center;justify-content:center;font-size:4rem;color:var(--dim)">？</div>`
        }
        <div class="series-tags">${seriesTagsHtml}</div>
        <span class="role-tag ${roleClass}">${roleLabel}</span>
      </div>
      <div class="card-body">
        <div class="char-name-en">${nameEn}</div>
        ${nameJp ? `<div class="char-name-jp">${nameJp}</div>` : ''}
        ${chips.length ? `<div class="meta-grid">${chips.join('')}</div>` : ''}

        <div class="divider"></div>

        <div class="desc-header">
          <div class="desc-label" style="margin-bottom:0">CHARACTER</div>
          ${desc ? `<button class="btn-translate${cachedJa ? ' translated' : ''}" id="btn-trans" data-charid="${ch.id}">${cachedJa ? '✓ 翻訳済み' : '🌐 日本語に翻訳'}</button>` : ''}
        </div>
        ${desc
          ? `<div class="desc-text" id="desc-text">${cachedJa || desc}</div>`
          : `<div class="no-desc">説明なし</div>`
        }

        ${quote ? `
        <div class="quote-box">
          <div class="quote-label">QUOTE</div>
          <div class="quote-text">「${quote}」</div>
          ${hasTTS ? `
          <div class="quote-footer">
            <button class="btn-voice" id="btn-voice">▶ 音声を聞く</button>
          </div>` : ''}
        </div>` : ''}
      </div>
    </div>
  `;

  const total = filtered.length;
  const pos   = filtered.indexOf(charMap.get(ch.id));
  counter.textContent = total ? `${pos >= 0 ? pos + 1 : '?'} / ${total} キャラクター` : '';

  // Translate button
  const btnTrans = document.getElementById('btn-trans');
  if (btnTrans) {
    btnTrans.addEventListener('click', async () => {
      if (btnTrans.classList.contains('translated')) return;
      btnTrans.disabled = true;
      btnTrans.textContent = '翻訳中…';
      try {
        const plainText = ch.description.replace(/~![\s\S]*?!~/g, '').replace(/[*_]/g, '');
        const ja = await translateText(plainText, ch.id);
        document.getElementById('desc-text').textContent = ja;
        btnTrans.classList.add('translated');
        btnTrans.textContent = '✓ 翻訳済み';
      } catch {
        btnTrans.disabled = false;
        btnTrans.textContent = '翻訳失敗 — 再試行';
      }
    });
  }

  // Voice button
  const btnVoice = document.getElementById('btn-voice');
  if (btnVoice && quote) {
    btnVoice.addEventListener('click', () => speakText(quote, btnVoice));
  }
}

// ── Filter + pick ─────────────────────────────────────────
function buildFiltered() {
  const all = [...charMap.values()];
  filtered = all.filter(({ edge, seriesLabels }) => {
    const matchSeries = seriesFilter === 'all' || seriesLabels.includes(seriesFilter);
    const matchRole   = roleFilter   === 'all' || edge.role === roleFilter;
    return matchSeries && matchRole;
  });
}

function pickRandom() {
  if (filtered.length === 0) return null;
  const current = history[historyIdx];
  if (filtered.length === 1) return filtered[0];
  let pick;
  do { pick = filtered[Math.floor(Math.random() * filtered.length)]; }
  while (pick === current);
  return pick;
}

function showNext() {
  const entry = pickRandom();
  if (!entry) return;
  history = history.slice(0, historyIdx + 1);
  history.push(entry);
  historyIdx++;
  renderCard(entry);
  btnPrev.disabled = historyIdx <= 0;
}

function showPrev() {
  if (historyIdx <= 0) return;
  historyIdx--;
  renderCard(history[historyIdx]);
  btnPrev.disabled = historyIdx <= 0;
}

function resetAndShow() {
  buildFiltered();
  history    = [];
  historyIdx = -1;
  btnPrev.disabled = true;
  if (filtered.length > 0) showNext();
  else wrap.innerHTML = `<div class="error-box">該当キャラクターなし</div>`;
}

// ── Init ──────────────────────────────────────────────────
async function init() {
  try {
    await fetchAll();

    if (charMap.size === 0) {
      wrap.innerHTML = `<div class="error-box">キャラクターが見つかりませんでした。</div>`;
      return;
    }

    // Build series filter buttons
    for (const label of seriesMap.keys()) {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.series = label;
      btn.textContent = label;
      seriesFilterRow.appendChild(btn);
    }

    filterSec.style.visibility = 'visible';
    btnNext.disabled = false;

    buildFiltered();
    showNext();

    // Series filter
    seriesFilterRow.addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      seriesFilterRow.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      seriesFilter = btn.dataset.series;
      resetAndShow();
    });

    // Role filter
    roleFilterRow.addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      roleFilterRow.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      roleFilter = btn.dataset.role;
      resetAndShow();
    });

  } catch (e) {
    wrap.innerHTML = `
      <div class="error-box">
        データの取得に失敗しました。<br>
        しばらくしてからリロードしてください。<br>
        <small>${e.message}</small>
      </div>`;
  }
}

btnNext.addEventListener('click', showNext);
btnPrev.addEventListener('click', showPrev);
init();
</script>
</body>
</html>
